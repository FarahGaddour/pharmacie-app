<div style="display:flex; justify-content:center; 
            align-items:center; height:100vh; 
            background-color:#f5f5f5;">

  <mat-card style="width: 400px; padding: 30px;">
    
    <mat-card-header>
      <mat-card-title style="text-align:center;">
        <mat-icon style="font-size:48px; color:#3f51b5;">local_pharmacy</mat-icon>
        <h2>Pharmacie App</h2>
        <p style="color:gray; font-size:14px;">Connectez-vous pour continuer</p>
      </mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        
        <mat-form-field appearance="outline" style="width:100%; margin-top:20px;">
          <mat-label>Email</mat-label>
          <input matInput formControlName="email" type="email" placeholder="email@example.com"/>
          <mat-icon matSuffix>email</mat-icon>
          <mat-error *ngIf="loginForm.get('email')?.hasError('required')">
            Email obligatoire
          </mat-error>
          <mat-error *ngIf="loginForm.get('email')?.hasError('email')">
            Email invalide
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" style="width:100%;">
          <mat-label>Mot de passe</mat-label>
          <input matInput formControlName="password" type="password"/>
          <mat-icon matSuffix>lock</mat-icon>
          <mat-error *ngIf="loginForm.get('password')?.hasError('required')">
            Mot de passe obligatoire
          </mat-error>
        </mat-form-field>

        <p style="color:red; text-align:center;">{{ erreurMessage }}</p>

        <button mat-raised-button color="primary" 
                type="submit" 
                style="width:100%; margin-top:10px;"
                [disabled]="loginForm.invalid">
          Se connecter
        </button>

      </form>

      <div style="margin-top:20px; padding:10px; background:#e8f5e9; border-radius:5px;">
        <p style="margin:0; font-size:12px; color:gray;">
         <strong>Admin :</strong> admin&#64;pharmacie.com / 123456<br>
<strong>User :</strong> user&#64;pharmacie.com / 123456
        </p>
      </div>

    </mat-card-content>
  </mat-card>
  

</div>
