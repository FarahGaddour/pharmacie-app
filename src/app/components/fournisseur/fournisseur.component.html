<div style="padding:20px;">

  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
    <h2><mat-icon>business</mat-icon> Liste des Fournisseurs</h2>
    <button mat-raised-button color="primary" (click)="openForm()">
      <mat-icon>add</mat-icon> Ajouter
    </button>
  </div>

  <!-- Formulaire -->
  <mat-card *ngIf="showForm" style="margin-bottom:20px; max-width:500px;">
    <mat-card-header>
      <mat-card-title>{{ isEdit ? 'Modifier' : 'Ajouter' }} un Fournisseur</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="fournisseurForm" (ngSubmit)="onSubmit()">

        <mat-form-field appearance="outline" style="width:100%;">
          <mat-label>Nom</mat-label>
          <input matInput formControlName="nom"/>
        </mat-form-field>

        <mat-form-field appearance="outline" style="width:100%;">
          <mat-label>Email</mat-label>
          <input matInput formControlName="email"/>
        </mat-form-field>

        <mat-form-field appearance="outline" style="width:100%;">
          <mat-label>Téléphone</mat-label>
          <input matInput formControlName="telephone"/>
        </mat-form-field>

        <mat-form-field appearance="outline" style="width:100%;">
          <mat-label>Ville</mat-label>
          <input matInput formControlName="ville"/>
        </mat-form-field>

        <div style="display:flex; gap:10px; margin-top:10px;">
          <button mat-raised-button color="primary" type="submit" [disabled]="fournisseurForm.invalid">
            <mat-icon>save</mat-icon> {{ isEdit ? 'Modifier' : 'Enregistrer' }}
          </button>
          <button mat-raised-button color="warn" type="button" (click)="annuler()">
            <mat-icon>cancel</mat-icon> Annuler
          </button>
        </div>

      </form>
    </mat-card-content>
  </mat-card>

  <!-- Tableau -->
  <table mat-table [dataSource]="dataSource" class="mat-elevation-z8" style="width:100%;">

    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef>ID</th>
      <td mat-cell *matCellDef="let element">{{ element.id }}</td>
    </ng-container>

    <ng-container matColumnDef="nom">
      <th mat-header-cell *matHeaderCellDef>Nom</th>
      <td mat-cell *matCellDef="let element">{{ element.nom }}</td>
    </ng-container>

    <ng-container matColumnDef="email">
      <th mat-header-cell *matHeaderCellDef>Email</th>
      <td mat-cell *matCellDef="let element">{{ element.email }}</td>
    </ng-container>

    <ng-container matColumnDef="telephone">
      <th mat-header-cell *matHeaderCellDef>Téléphone</th>
      <td mat-cell *matCellDef="let element">{{ element.telephone }}</td>
    </ng-container>

    <ng-container matColumnDef="ville">
      <th mat-header-cell *matHeaderCellDef>Ville</th>
      <td mat-cell *matCellDef="let element">{{ element.ville }}</td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let element">
        <button mat-icon-button color="primary" (click)="editFournisseur(element)">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="warn" (click)="deleteFournisseur(element.id)">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

  </table>
</div>
