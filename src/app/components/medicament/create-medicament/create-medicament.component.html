<div style="padding:20px; max-width:600px; margin:auto;">

  <h2><mat-icon>add_circle</mat-icon> Ajouter un Médicament</h2>

  <mat-card>
    <mat-card-content>
      <form [formGroup]="medicamentForm" (ngSubmit)="onSubmit()">

        <mat-form-field appearance="outline" style="width:100%;">
          <mat-label>Nom du médicament</mat-label>
          <input matInput formControlName="nom"/>
          <mat-error *ngIf="medicamentForm.get('nom')?.hasError('required')">
            Nom obligatoire
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" style="width:100%;">
          <mat-label>Prix (DT)</mat-label>
          <input matInput type="number" formControlName="prix"/>
          <mat-error *ngIf="medicamentForm.get('prix')?.hasError('required')">
            Prix obligatoire
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" style="width:100%;">
          <mat-label>Stock</mat-label>
          <input matInput type="number" formControlName="stock"/>
          <mat-error *ngIf="medicamentForm.get('stock')?.hasError('required')">
            Stock obligatoire
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" style="width:100%;">
          <mat-label>Catégorie</mat-label>
          <mat-select formControlName="categorie">
            <mat-option value="Analgésique">Analgésique</mat-option>
            <mat-option value="Antibiotique">Antibiotique</mat-option>
            <mat-option value="Anti-inflammatoire">Anti-inflammatoire</mat-option>
            <mat-option value="Antiviral">Antiviral</mat-option>
            <mat-option value="Autre">Autre</mat-option>
          </mat-select>
          <mat-error *ngIf="medicamentForm.get('categorie')?.hasError('required')">
            Catégorie obligatoire
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" style="width:100%;">
          <mat-label>Fournisseur</mat-label>
          <mat-select formControlName="fournisseurId">
            <mat-option *ngFor="let f of fournisseurs" [value]="f.id">
              {{ f.nom }}
            </mat-option>
          </mat-select>
          <mat-error *ngIf="medicamentForm.get('fournisseurId')?.hasError('required')">
            Fournisseur obligatoire
          </mat-error>
        </mat-form-field>

        <div style="display:flex; gap:10px; margin-top:10px;">
          <button mat-raised-button color="primary" type="submit" [disabled]="medicamentForm.invalid">
            <mat-icon>save</mat-icon> Enregistrer
          </button>
          <button mat-raised-button color="warn" type="button" (click)="annuler()">
            <mat-icon>cancel</mat-icon> Annuler
          </button>
        </div>

      </form>
    </mat-card-content>
  </mat-card>
</div>
