<mat-sidenav-container>

  <!-- Side nav -->
  <mat-sidenav #drawer fixedInViewport="true" mode="over" opened="false" style="width: 230px;">
    <mat-toolbar color="primary">
      <mat-icon>local_pharmacy</mat-icon>
      <span> Pharmacie </span>
    </mat-toolbar>
    <mat-nav-list>
  <a mat-list-item routerLink="/dashboard" (click)="drawer.close()">
    <mat-icon>dashboard</mat-icon><span> Dashboard</span>
  </a>
  <a mat-list-item routerLink="/medicaments" (click)="drawer.close()">
    <mat-icon>medication</mat-icon><span> Médicaments</span>
  </a>
  <a mat-list-item routerLink="/fournisseurs" *ngIf="isAdmin" (click)="drawer.close()">
    <mat-icon>business</mat-icon><span> Fournisseurs</span>
  </a>
  <a mat-list-item routerLink="/patients" *ngIf="isAdmin" (click)="drawer.close()">
    <mat-icon>people</mat-icon><span> Patients</span>
  </a>
  <a mat-list-item routerLink="/historique" *ngIf="isAdmin" (click)="drawer.close()">
    <mat-icon>history</mat-icon><span> Historique Ventes</span>
  </a>
  <a mat-list-item routerLink="/ventes" *ngIf="!isAdmin" (click)="drawer.close()">
    <mat-icon>point_of_sale</mat-icon><span> Nouvelle Vente</span>
  </a>
  <a mat-list-item routerLink="/patients" *ngIf="!isAdmin" (click)="drawer.close()">
    <mat-icon>people</mat-icon><span> Patients</span>
  </a>
</mat-nav-list>
  </mat-sidenav>

  <!-- Side nav content -->
  <mat-sidenav-content>
    <mat-toolbar color="primary">
      <button mat-icon-button (click)="drawer.toggle()">
        <mat-icon>menu</mat-icon>
      </button>
      <span> Pharmacie App</span>

      <span style="flex: 1 1 auto;"></span>

      <button [matMenuTriggerFor]="userMenu" mat-button>
        <mat-icon>account_circle</mat-icon>
        <span> {{ currentUser }}</span>
        <mat-icon>keyboard_arrow_down</mat-icon>
      </button>

      <mat-menu #userMenu="matMenu">
        <button mat-menu-item (click)="logout()">
          <mat-icon>exit_to_app</mat-icon>
          <span>Logout</span>
        </button>
      </mat-menu>
    </mat-toolbar>

    <div style="padding: 20px;">
      <router-outlet></router-outlet>
    </div>

  </mat-sidenav-content>

</mat-sidenav-container>
